<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TravelMap</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css?v=12">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
</head>
<body>
  <div class="app-shell">

    <!-- ═══ LEFT SIDEBAR ═══ -->
    <aside id="sidebar">

      <!-- Brand header -->
      <div class="sidebar-header">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
            <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
          </svg>
        </div>
        <h1 class="brand-name">TravelMap</h1>
        <button class="btn-theme" id="btn-theme" title="Toggle theme">☀️</button>
      </div>

      <!-- Snapshot stats grid -->
      <div class="sidebar-section">
        <p class="section-label">Snapshot</p>
        <div class="stats-grid">
          <div class="stat-card">
            <p class="stat-label">Countries</p>
            <p class="stat-num" id="stat-countries-num">0</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Cities</p>
            <p class="stat-num" id="stat-cities-num">0</p>
          </div>
        </div>
      </div>

      <!-- Collection nav -->
      <div class="sidebar-section">
        <p class="section-label">Collection</p>
        <nav class="collection-nav">
          <a href="#" class="nav-item active" data-filter="all" id="nav-all">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            <span class="nav-label">All</span>
            <span class="nav-badge" id="nav-all-count">0</span>
          </a>
          <a href="#" class="nav-item" data-filter="visited" id="nav-visited">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span class="nav-label">Visited</span>
            <span class="nav-badge" id="nav-visited-count">0</span>
          </a>
          <a href="#" class="nav-item" data-filter="wishlist" id="nav-wishlist">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="nav-label">Want to visit</span>
            <span class="nav-badge" id="nav-wishlist-count">0</span>
          </a>
          <a href="#" class="nav-item" data-filter="lived" id="nav-lived">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span class="nav-label">Lived there</span>
            <span class="nav-badge" id="nav-lived-count">0</span>
          </a>
        </nav>
      </div>

      <!-- Recent Logs -->
      <div class="sidebar-section" id="recent-logs-section">
        <p class="section-label">Recent Logs</p>
        <div id="recent-logs" class="recent-logs"></div>
      </div>

      <!-- Friends -->
      <div class="sidebar-section" id="friends-section">
        <div class="section-header">
          <p class="section-label">Friends</p>
          <button class="btn-section-action" id="btn-copy-invite" title="Copy invite link">🔗</button>
          <button class="btn-section-action" id="btn-reset-invite" title="Reset invite link" style="font-size:0.65rem">↺</button>
        </div>
        <div id="friends-list" class="social-list"></div>
      </div>

      <!-- Groups (placeholder for Task 6) -->
      <div class="sidebar-section" id="groups-section">
        <div class="section-header">
          <p class="section-label">Groups</p>
          <button class="btn-section-action" id="btn-create-group" title="Create group">+ New</button>
        </div>
        <div id="groups-list" class="social-list"></div>
      </div>

      <!-- Spacer -->
      <div style="flex:1"></div>

      <!-- Footer: Add + Sign out -->
      <div class="sidebar-footer">
        <button class="btn-add-location" id="btn-add-location">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add New Location
        </button>
        <button class="btn-signout" id="btn-signout">Sign out</button>
      </div>

    </aside>

    <!-- ═══ MAP AREA ═══ -->
    <main class="map-area">
      <!-- View mode banner -->
      <div id="view-banner" class="view-banner" style="display:none">
        <button id="view-banner-back" class="view-banner-back">← Back</button>
        <span  id="view-banner-title" class="view-banner-title"></span>
      </div>

      <div id="map"></div>

      <!-- Mobile hamburger (hidden on desktop) -->
      <button class="btn-menu" id="btn-menu" aria-label="Open menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <!-- Top-right: search + user pill -->
      <div class="top-right-bar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="city-search" placeholder="Search cities..." autocomplete="off">
          <div id="search-results"></div>
        </div>
        <div class="user-pill" id="user-pill">
          <img id="user-avatar" src="" alt="Avatar" class="user-avatar">
          <span id="user-name" class="user-name">...</span>
        </div>
      </div>

      <!-- Bottom-left: legend -->
      <div class="map-legend">
        <div class="legend-item"><span class="legend-dot indigo"></span><span>Visited</span></div>
        <div class="legend-item"><span class="legend-dot amber"></span><span>Lived</span></div>
        <div class="legend-item"><span class="legend-dot emerald"></span><span>Wishlist</span></div>
      </div>
    </main>

  </div><!-- .app-shell -->

  <!-- Mobile sidebar backdrop -->
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <!-- ═══ OVERLAYS ═══ -->

  <!-- City Add Dialog -->
  <div id="city-dialog">
    <div class="dialog-card">
      <h3 id="dialog-city-name">München</h3>
      <div class="dialog-label">Type</div>
      <div class="radio-group">
        <div class="radio-opt selected" data-type="visited">✓ Visited</div>
        <div class="radio-opt"          data-type="wishlist">⭐ Wishlist</div>
      </div>
      <label class="checkbox-row" id="lived-row">
        <input type="checkbox" id="lived-checkbox">
        🏠 Lived there
      </label>
      <div class="dialog-actions">
        <button class="btn-cancel" id="dialog-cancel">Cancel</button>
        <button class="btn-add"    id="dialog-add">Add</button>
      </div>
    </div>
  </div>

  <!-- City Remove Popup -->
  <div id="city-popup">
    <button id="city-popup-close">✕</button>
    <p id="city-popup-name">München</p>
    <button class="btn-remove-city" id="btn-remove-city">🗑️ Remove</button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Group Create Modal -->
  <div id="group-modal" style="display:none">
    <div class="group-modal-card">
      <h3>New Group</h3>
      <input type="text" id="group-name-input" placeholder="Group name…" maxlength="40" autocomplete="off">
      <p class="dialog-label" style="margin-top:14px">Add friends</p>
      <div id="group-friends-checklist" class="group-friends-checklist"></div>
      <div class="dialog-actions" style="margin-top:16px">
        <button class="btn-cancel" id="group-modal-cancel">Cancel</button>
        <button class="btn-add"    id="group-modal-create">Create</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js?v=12"></script>
</body>
</html>
