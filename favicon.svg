<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ocean background -->
  <circle cx="50" cy="50" r="48" fill="#3b82f6"/>
  <!-- Land-style continents (simplified) -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Latitude lines -->
  <ellipse cx="50" cy="50" rx="48" ry="18" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="48" ry="36" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Longitude lines -->
  <ellipse cx="50" cy="50" rx="22" ry="48" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="44" ry="48" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Equator -->
  <line x1="2" y1="50" x2="98" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Prime meridian -->
  <line x1="50" y1="2" x2="50" y2="98" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Small land masses -->
  <ellipse cx="35" cy="38" rx="10" ry="7" fill="rgba(255,255,255,0.25)" rx="10" ry="7" transform="rotate(-15 35 38)"/>
  <ellipse cx="62" cy="45" rx="8" ry="6" fill="rgba(255,255,255,0.2)" transform="rotate(10 62 45)"/>
  <ellipse cx="48" cy="62" rx="9" ry="5" fill="rgba(255,255,255,0.2)" transform="rotate(-5 48 62)"/>
</svg>
